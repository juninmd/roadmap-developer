name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Check Formatting (Prettier)
        run: npx prettier --check .

      - name: Run ESLint
        run: npm run lint

      - name: Run Markdown Lint
        run: npm run lint:md

      - name: Security Scan (npm audit)
        run: npm run security -- --audit-level=critical

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm run test

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/coverage-final.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build with VitePress
        run: npm run docs:build

      - name: Cache Build Artifacts
        uses: actions/cache@v3
        with:
          path: .vitepress/dist
          key: ${{ runner.os }}-build-${{ github.sha }}

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Build with VitePress (for e2e)
        run: npm run docs:build

      - name: Run E2E Tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 15

  deploy-staging:
    runs-on: ubuntu-latest
    needs: e2e
    environment:
      name: staging
      url: "https://staging.roadmap-developer.com"
    if: github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    steps:
      - name: Deploy to Staging Placeholder
        run: echo "Deploying build artifacts to Staging environment."

      - name: Health Check (Staging)
        run: echo "Performing health check on staging..."

  deploy-production:
    runs-on: ubuntu-latest
    needs: e2e
    environment:
      name: production
      url: "https://roadmap-developer.com"
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to Production Placeholder
        run: echo "Deploying build artifacts to Production. Requires manual approval in GitHub Environments."

      - name: Post-deployment Health Check
        run: echo "Verifying production health check endpoints..."

      - name: Setup Rollback Capability
        run: echo "Registering deployment ID for rollback capability."

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-production, deploy-staging]
    if: failure()
    steps:
      - name: Slack Notification
        run: echo "Sending failure notification to Slack/Email alerting team of deployment/build issue."
