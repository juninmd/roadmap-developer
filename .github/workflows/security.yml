name: "Security Scan"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '30 1 * * 0' # Run weekly on Sundays

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Run TruffleHog Secret Scanner
      uses: trufflesecurity/trufflehog@cd5373f443d4ce6f5f0b0933a595fb0fa3e5954a # v3.82.7
      with:
        path: ./
        extra_args: --debug --only-verified
